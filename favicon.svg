<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f4e"/>
      <stop offset="100%" style="stop-color:#0d0f2b"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>
  <!-- Subtle border glow -->
  <rect width="32" height="32" rx="7" fill="none" stroke="url(#accentGrad)" stroke-width="0.75" opacity="0.6"/>
  <!-- Accent dot top-right -->
  <circle cx="26.5" cy="5.5" r="2" fill="url(#accentGrad)" opacity="0.85"/>
  <!-- JDT lettermark -->
  <text
    x="16"
    y="22"
    text-anchor="middle"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="14"
    font-weight="700"
    letter-spacing="-0.5"
    fill="url(#textGrad)"
  >JDT</text>
  <!-- Bottom accent line -->
  <rect x="8" y="26" width="16" height="1.5" rx="0.75" fill="url(#accentGrad)" opacity="0.7"/>
</svg>
