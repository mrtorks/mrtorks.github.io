<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Background glow -->
  <circle cx="40" cy="40" r="38" fill="url(#slidersGlow)" opacity="0.12"/>
  <!-- Track lines -->
  <line x1="14" y1="26" x2="66" y2="26" stroke="url(#trackGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="14" y1="40" x2="66" y2="40" stroke="url(#trackGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="14" y1="54" x2="66" y2="54" stroke="url(#trackGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Active track fills -->
  <line x1="14" y1="26" x2="34" y2="26" stroke="url(#activeGrad1)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="40" x2="66" y2="40" stroke="url(#activeGrad2)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="54" x2="50" y2="54" stroke="url(#activeGrad3)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Thumb 1 -->
  <circle cx="34" cy="26" r="6" fill="url(#thumb1)" filter="url(#thumbGlow)"/>
  <circle cx="34" cy="26" r="3" fill="white" opacity="0.9"/>
  <!-- Thumb 2 -->
  <circle cx="28" cy="40" r="6" fill="url(#thumb2)" filter="url(#thumbGlow)"/>
  <circle cx="28" cy="40" r="3" fill="white" opacity="0.9"/>
  <!-- Thumb 3 -->
  <circle cx="50" cy="54" r="6" fill="url(#thumb3)" filter="url(#thumbGlow)"/>
  <circle cx="50" cy="54" r="3" fill="white" opacity="0.9"/>
  <defs>
    <linearGradient id="trackGrad" x1="14" y1="0" x2="66" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="activeGrad1" x1="14" y1="0" x2="34" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="activeGrad2" x1="28" y1="0" x2="66" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="activeGrad3" x1="14" y1="0" x2="50" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="thumb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <radialGradient id="thumb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="thumb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <radialGradient id="slidersGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="thumbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
